x-codalith-env: &codalith-env
  PYTHONPATH: ${CODALITH_WORKSPACE_DIR:-/workspace}/src
  CODALITH_AUDIT_LOG: ${CODALITH_AUDIT_LOG:-/workspace/data/audit/source_reads.jsonl}
  CODALITH_ENGINE_VERSION: ${CODALITH_ENGINE_VERSION:-5.7.4}
  CODALITH_ENGINE_SOURCE_ROOT: ${CODALITH_ENGINE_SOURCE_ROOT:-/srv/ue/5.7.4}
  CODALITH_ENGINE_INDEXED_ROOT: ${CODALITH_ENGINE_INDEXED_ROOT:-/srv/codalith/corpora/ue-5.7.4}
  CODALITH_ENGINE_CARD_ROOT: ${CODALITH_ENGINE_CARD_ROOT:-/srv/codalith/cards/ue-5.7.4}
  CODALITH_ENGINE_ACCESS_SCOPE: ${CODALITH_ENGINE_ACCESS_SCOPE:-ue:5.7}
  UV_PROJECT_ENVIRONMENT: ${CODALITH_UV_ENV:-/tmp/codalith-venv}
  UV_LINK_MODE: copy
  UV_DEFAULT_INDEX: ${CODALITH_PYPI_INDEX:-https://mirrors.tuna.tsinghua.edu.cn/pypi/web/simple/}
  PIP_INDEX_URL: ${CODALITH_PYPI_INDEX:-https://mirrors.tuna.tsinghua.edu.cn/pypi/web/simple/}

services:
  test:
    image: ghcr.io/astral-sh/uv:python3.12-bookworm
    working_dir: ${CODALITH_WORKSPACE_DIR:-/workspace}
    env_file:
      - .env
    environment:
      <<: *codalith-env
    volumes:
      - ${CODALITH_REPO_ROOT:-.}:${CODALITH_WORKSPACE_DIR:-/workspace}
    command: >
      sh -lc "uv sync --extra dev &&
      uv run pytest &&
      uv run ruff check src tests jobs &&
      uv run mypy src"

  ue-acceptance:
    image: ghcr.io/astral-sh/uv:python3.12-bookworm
    profiles: ["ue"]
    working_dir: ${CODALITH_WORKSPACE_DIR:-/workspace}
    env_file:
      - .env
    environment:
      <<: *codalith-env
      CODALITH_SEMANTIC_DB: ${CODALITH_SEMANTIC_DB:-/tmp/codalith-semantic.sqlite}
    volumes:
      - ${CODALITH_REPO_ROOT:-.}:${CODALITH_WORKSPACE_DIR:-/workspace}
      - ${CODALITH_ENGINE_HOST_ROOT:-E:/UnrealEngine_5.7}:${CODALITH_ENGINE_SOURCE_ROOT:-/srv/ue/5.7.4}:ro
    command: >
      sh -lc "uv sync --extra dev &&
      uv run codalith-index-engine --version \"$${CODALITH_ENGINE_VERSION}\" --smoke &&
      uv run codalith-extract-semantic --version \"$${CODALITH_ENGINE_VERSION}\" --semantic-db \"$${CODALITH_SEMANTIC_DB}\" --min-modules 100 --min-reflection-entities 100 --min-guards 10 --stop-after-min &&
      uv run codalith-verify-cards --version \"$${CODALITH_ENGINE_VERSION}\" &&
      uv run pytest -m ue_acceptance"

  coderag-acceptance:
    image: ghcr.io/astral-sh/uv:python3.12-bookworm
    profiles: ["coderag"]
    working_dir: ${CODALITH_WORKSPACE_DIR:-/workspace}
    env_file:
      - .env
    environment:
      <<: *codalith-env
      CODERAG_PROVIDER: fake
      CODERAG_INDEX_ALL_TEXT: "1"
      CODERAG_GITIGNORE: "0"
      CODERAG_STORE_DIR: ${CODALITH_CODERAG_STORE_DIR:-/var/lib/codalith/coderag/ue-5.7.4}
      CODALITH_CODERAG_STORE_DIR: ${CODALITH_CODERAG_STORE_DIR:-/var/lib/codalith/coderag/ue-5.7.4}
      CODALITH_NATIVE_CODERAG_PROGRESS: "1"
    volumes:
      - ${CODALITH_REPO_ROOT:-.}:${CODALITH_WORKSPACE_DIR:-/workspace}
      - ${CODALITH_ENGINE_HOST_ROOT:-E:/UnrealEngine_5.7}:${CODALITH_ENGINE_SOURCE_ROOT:-/srv/ue/5.7.4}:ro
      - ${CODALITH_ENGINE_SOURCE_HOST_ROOT:-E:/UnrealEngine_5.7/Engine/Source}:${CODALITH_ENGINE_INDEXED_ROOT:-/srv/codalith/corpora/ue-5.7.4}/Engine/Source:ro
      - ${CODALITH_GAMEPLAY_ABILITIES_HOST_ROOT:-E:/UnrealEngine_5.7/Engine/Plugins/Runtime/GameplayAbilities}:${CODALITH_ENGINE_INDEXED_ROOT:-/srv/codalith/corpora/ue-5.7.4}/Engine/Plugins/Runtime/GameplayAbilities:ro
    command: >
      sh -lc "uv sync &&
      uv run codalith-coderag-acceptance --version \"$${CODALITH_ENGINE_VERSION}\" --provider fake --full"

  coderag-ollama-acceptance:
    image: ghcr.io/astral-sh/uv:python3.12-bookworm
    profiles: ["coderag"]
    working_dir: ${CODALITH_WORKSPACE_DIR:-/workspace}
    env_file:
      - .env
    environment:
      <<: *codalith-env
      CODERAG_PROVIDER: openai
      CODERAG_OPENAI_MODEL: ${CODERAG_OPENAI_MODEL:-qwen3-embedding:0.6b}
      CODERAG_OPENAI_BATCH: ${CODERAG_OPENAI_BATCH:-32}
      CODERAG_WORKERS: ${CODERAG_WORKERS:-4}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-http://host.docker.internal:11434/v1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-ollama}
      CODERAG_INDEX_ALL_TEXT: "1"
      CODERAG_GITIGNORE: "0"
      CODERAG_STORE_DIR: ${CODALITH_CODERAG_OLLAMA_STORE_DIR:-/var/lib/codalith/coderag/ue-5.7.4-ollama-qwen3-embedding-0.6b}
      CODALITH_CODERAG_STORE_DIR: ${CODALITH_CODERAG_OLLAMA_STORE_DIR:-/var/lib/codalith/coderag/ue-5.7.4-ollama-qwen3-embedding-0.6b}
      CODALITH_CODERAG_MAX_CHUNK_CHARS: ${CODALITH_CODERAG_MAX_CHUNK_CHARS:-2048}
      CODALITH_NATIVE_CODERAG_PROGRESS: "1"
      PYTHONWARNINGS: ignore::SyntaxWarning
    volumes:
      - ${CODALITH_REPO_ROOT:-.}:${CODALITH_WORKSPACE_DIR:-/workspace}
      - coderag-ollama-store:${CODALITH_CODERAG_VOLUME_ROOT:-/var/lib/codalith/coderag}
      - ${CODALITH_ENGINE_HOST_ROOT:-E:/UnrealEngine_5.7}:${CODALITH_ENGINE_SOURCE_ROOT:-/srv/ue/5.7.4}:ro
      - ${CODALITH_ENGINE_SOURCE_HOST_ROOT:-E:/UnrealEngine_5.7/Engine/Source}:${CODALITH_ENGINE_INDEXED_ROOT:-/srv/codalith/corpora/ue-5.7.4}/Engine/Source:ro
      - ${CODALITH_GAMEPLAY_ABILITIES_HOST_ROOT:-E:/UnrealEngine_5.7/Engine/Plugins/Runtime/GameplayAbilities}:${CODALITH_ENGINE_INDEXED_ROOT:-/srv/codalith/corpora/ue-5.7.4}/Engine/Plugins/Runtime/GameplayAbilities:ro
    command: >
      sh -lc "uv sync &&
      uv run codalith-coderag-acceptance --version \"$${CODALITH_ENGINE_VERSION}\" --provider openai --output-dir reports/coderag-ollama"

volumes:
  coderag-ollama-store:
