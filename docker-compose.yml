x-runtime: &runtime
  build:
    context: .
    target: runtime
  image: codalith:local
  environment: &runtime-environment
    CODALITH_DEFAULT_TARGET: ${CODALITH_DEFAULT_TARGET:-sample}
    CODALITH_REGISTRY: /app/configs/registry.toml
    CODALITH_SOURCE_POLICY: /app/configs/source-policy.toml
    CODALITH_SAMPLE_INDEX_ROOT: /app/data/indexes/sample
    CODALITH_HTTP_HOST: 0.0.0.0
    CODALITH_HTTP_PORT: ${CODALITH_HTTP_PORT:-8765}
    CODALITH_HTTP_ENDPOINT: ${CODALITH_HTTP_ENDPOINT:-/mcp}
    CODALITH_HTTP_ALLOWED_ORIGINS: ${CODALITH_HTTP_ALLOWED_ORIGINS:-}
    CODALITH_HTTP_ALLOWED_HOSTS: ${CODALITH_HTTP_ALLOWED_HOSTS:-}
    CODALITH_HTTP_MAX_REQUEST_BYTES: ${CODALITH_HTTP_MAX_REQUEST_BYTES:-1048576}
    CODALITH_EMBEDDING_BASE_URL: ${CODALITH_EMBEDDING_BASE_URL:-}
    CODALITH_EMBEDDING_API_KEY: ${CODALITH_EMBEDDING_API_KEY:-}
    LANCE_INCLUDE_VECTOR_CENTROIDS: ${LANCE_INCLUDE_VECTOR_CENTROIDS:-false}
  volumes:
    - codalith-data:/app/data

services:
  index-sample:
    <<: *runtime
    command: ["index", "build", "--corpus", "sample", "--semantic", "build"]
    restart: "no"

  mcp-http:
    <<: *runtime
    depends_on:
      index-sample:
        condition: service_completed_successfully
    command: ["serve", "--transport", "http"]
    ports:
      - "${CODALITH_HTTP_BIND:-127.0.0.1}:${CODALITH_HTTP_PORT:-8765}:${CODALITH_HTTP_PORT:-8765}"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:${CODALITH_HTTP_PORT:-8765}/readyz', timeout=2)",
        ]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s

  test:
    profiles: ["test"]
    build:
      context: .
      target: test
    image: codalith-test:local
    command: ["pytest", "-q"]

  index-ue:
    <<: *runtime
    profiles: ["ue"]
    environment: &ue-environment
      <<: *runtime-environment
      CODALITH_DEFAULT_TARGET: ue-5.7.4
      CODALITH_UE_SOURCE_REVISION: ${CODALITH_UE_SOURCE_REVISION:-5.7.4}
      CODALITH_UE_SOURCE_ROOT: /srv/ue/5.7.4
      CODALITH_UE_INDEX_ROOT: /var/lib/codalith/indexes/ue-5.7.4
      CODALITH_UE_CODERAG_STORE_DIR: /var/lib/codalith/coderag/ue-5.7.4
      CODALITH_UE_EMBEDDING_PROVIDER: ${CODALITH_UE_EMBEDDING_PROVIDER:-openai}
      CODALITH_UE_EMBEDDING_MODEL: ${CODALITH_UE_EMBEDDING_MODEL:-text-embedding-3-small}
    volumes: &ue-volumes
      - ${CODALITH_UE_SOURCE_HOST_DIR:-./.local/ue-5.7.4}:/srv/ue/5.7.4:ro
      - ${CODALITH_UE_INDEX_HOST_DIR:-./.local/indexes/ue-5.7.4}:/var/lib/codalith/indexes/ue-5.7.4
      - ${CODALITH_UE_CODERAG_HOST_DIR:-./.local/coderag/ue-5.7.4}:/var/lib/codalith/coderag/ue-5.7.4
    command: ["index", "build", "--corpus", "ue-5.7.4", "--semantic", "adopt"]
    restart: "no"

  mcp-http-ue:
    <<: *runtime
    profiles: ["ue"]
    environment: *ue-environment
    volumes: *ue-volumes
    command: ["serve", "--transport", "http"]
    ports:
      - "${CODALITH_HTTP_BIND:-127.0.0.1}:${CODALITH_HTTP_PORT:-8765}:${CODALITH_HTTP_PORT:-8765}"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:${CODALITH_HTTP_PORT:-8765}/readyz', timeout=2)",
        ]
      interval: 10s
      timeout: 3s
      retries: 30
      start_period: 10s

volumes:
  codalith-data:
